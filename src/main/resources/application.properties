spring.application.name=desa-backend

# -- Logging ------------------------------------------------
logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.example.desabackend=DEBUG
logging.level.org.springframework.mail=DEBUG

# -- SQL Server datasource ---------------------------------
# Azure: usa SPRING_DATASOURCE_URL con authentication=ActiveDirectoryManagedIdentity
# Local: activar perfil "local" -> ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=desa_db;encrypt=false;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# -- JPA / Hibernate ---------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# -- Inicializacion de datos -------------------------------
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# -- Email (SMTP) ------------------------------------------
# Defaults de produccion. En local, activar el perfil 'local'
# para usar MailHog (ver application-local.properties).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:${MAIL_HOST:smtp.gmail.com}}
mail.fail-fast=${MAIL_FAIL_FAST:true}

# -- Mail Protocol Configuration --
spring.mail.protocol=smtp
spring.mail.test-connection=false

# -- JWT ----------------------------------------------------
jwt.secret=${JWT_SECRET:MyVerySecureSecretKeyForJWT32ByteMinimumRequired}
jwt.expiration=${JWT_EXPIRATION:120000}
