spring.application.name=desa-backend

# ── Logging ──────────────────────────────────────────
logging.file.name=logs/app.log
logging.level.root=INFO

# ── SQL Server datasource ────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=desa_db;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YourStrong!Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# ── Inicialización de datos ──────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# ── Email (SMTP) ─────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:uadetps33@gmail.com}
spring.mail.password=${MAIL_PASSWORD:derqhphzmnrrgzvi}
spring.mail.from=${MAIL_FROM:noreply@xplorenow.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── JWT ───────────────────────────────────────────────
jwt.secret=${JWT_SECRET:MyVerySecureSecretKeyForJWT32ByteMinimumRequired}
jwt.expiration=${JWT_EXPIRATION:86400000}
