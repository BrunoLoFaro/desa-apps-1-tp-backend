# Test datasource — H2 in-memory, no SQL Server needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Deshabilitar el data.sql (tiene sintaxis SQL Server incompatible con H2)
spring.sql.init.mode=never

# Mail — deshabilitado en tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.test-connection=false
mail.fail-fast=false

# JWT — valor fijo para tests
jwt.secret=TestSecretKeyForJWTThatIsAtLeast32BytesLong
jwt.expiration=3600000
