services:
  # ── SMTP local para desarrollo (captura mails OTP) ──
  mailhog:
    image: mailhog/mailhog:latest
    container_name: desa-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI: http://localhost:8025

  # ── SQL Server 2022 ────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: desa-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Inicialización de la DB (crea la base si no existe) ─
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: desa-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: >
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "YourStrong!Passw0rd" -C
      -Q "IF DB_ID('desa_db') IS NULL CREATE DATABASE desa_db;"
    restart: "no"
  # ── Spring Boot App ────────────────────────────────
  # Descomentar para correr la app en Docker.
  # Si tenés problemas de proxy con Docker Hub, comentá este bloque
  # y corré la app local con: ./mvnw spring-boot:run
  
  app:
    build: .
    container_name: desa-backend
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-local}"
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=desa_db;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "YourStrong!Passw0rd"
      MAIL_HOST: "${MAIL_HOST:-mailhog}"
      MAIL_PORT: "${MAIL_PORT:-1025}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-noreply@xplorenow.local}"
      MAIL_SMTP_AUTH: "${MAIL_SMTP_AUTH:-false}"
      MAIL_SMTP_STARTTLS_ENABLE: "${MAIL_SMTP_STARTTLS_ENABLE:-false}"
      MAIL_SMTP_STARTTLS_REQUIRED: "${MAIL_SMTP_STARTTLS_REQUIRED:-false}"
      MAIL_SMTP_SSL_TRUST: "${MAIL_SMTP_SSL_TRUST:-*}"
      MAIL_FAIL_FAST: "${MAIL_FAIL_FAST:-false}"
    ports:
      - "8080:8080"
    volumes:
      - desa-logs:/app/logs

volumes:
  sqlserver-data:
  desa-logs:
